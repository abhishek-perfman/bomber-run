name: Unity License Activation

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request Activation File (.alf)
    runs-on: ubuntu-latest
    steps:
      # Request manual activation file (.alf)
      - name: Request manual activation file
        id: request
        uses: game-ci/unity-request-activation-file@v2

      # Upload the .alf file as a workflow artifact
      - name: Upload activation file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_License_Request.alf
          path: ${{ steps.request.outputs.filePath }}
